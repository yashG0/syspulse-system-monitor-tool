<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SysPulse</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0d1117;
            color: #e6edf3;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 14px;
            line-height: 1.5;
            padding: 1.5rem 2rem;
        }

        header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #21262d;
        }

        h1 { font-size: 1.1rem; font-weight: 600; color: #58a6ff; letter-spacing: 0.5px; }

        #status {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 20px;
            background: #21262d;
            color: #8b949e;
            font-weight: 500;
        }
        #status.connected { background: #1a3a2a; color: #3fb950; }
        #status.disconnected { background: #3a1a1a; color: #f85149; }

        .layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto;
            gap: 1rem;
        }

        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 1.2rem 1.4rem;
        }

        .card-head {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #58a6ff;
            margin-bottom: 1rem;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid #21262d;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
            border-bottom: 1px solid #161b22;
        }

        .row:last-of-type { border-bottom: none; }

        .lbl { font-size: 13px; color: #8b949e; }
        .val { font-size: 13px; font-weight: 600; color: #e6edf3; }
        .val.warn { color: #d29922; }
        .val.danger { color: #f85149; }

        .big-val {
            font-size: 2rem;
            font-weight: 700;
            color: #e6edf3;
            line-height: 1;
            margin: 0.5rem 0 0.2rem;
        }

        .sub-val { font-size: 12px; color: #8b949e; margin-bottom: 0.8rem; }

        .bar-wrap { background: #21262d; border-radius: 4px; height: 5px; margin: 8px 0 4px; }
        .bar { height: 5px; border-radius: 4px; background: #3fb950; transition: width 1.2s ease; }
        .bar.warn { background: #d29922; }
        .bar.danger { background: #f85149; }

        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

        .metric-block { padding: 0.8rem; background: #0d1117; border-radius: 8px; }
        .metric-label { font-size: 11px; color: #8b949e; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
        .metric-value { font-size: 1.4rem; font-weight: 700; color: #e6edf3; }

        .divider { border: none; border-top: 1px solid #21262d; margin: 1rem 0; }

        .cores-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 0.8rem; }
        .core { background: #0d1117; border-radius: 6px; padding: 6px 8px; }
        .core-top { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; }
        .core-label { color: #8b949e; }

        .span-full { grid-column: span 2; }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        thead th {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8b949e;
            text-align: left;
            padding: 0 0.5rem 0.6rem;
            border-bottom: 1px solid #30363d;
        }
        tbody td {
            font-size: 13px;
            padding: 7px 0.5rem;
            border-bottom: 1px solid #21262d;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: #1c2128; }
        th:nth-child(1), td:nth-child(1) { width: 9%; color: #8b949e; }
        th:nth-child(2), td:nth-child(2) { width: 47%; }
        th:nth-child(3), td:nth-child(3) { width: 22%; }
        th:nth-child(4), td:nth-child(4) { width: 22%; }
    </style>
</head>
<body>

<header>
    <h1>⚡ SysPulse</h1>
    <span id="status">Connecting...</span>
</header>

<div class="layout">

    <div class="card">
        <div class="card-head">CPU</div>
        <div class="big-val" id="cpu-percent">--%</div>
        <div class="sub-val" id="cpu-sub">-- cores</div>
        <div class="bar-wrap"><div class="bar" id="cpu-bar" style="width:0%"></div></div>
        <div class="cores-grid" id="cpu-cores"></div>
    </div>

    <div class="card">
        <div class="card-head">Memory</div>
        <div class="big-val" id="ram-percent">--%</div>
        <div class="sub-val" id="ram-sub">-- / -- GB</div>
        <div class="bar-wrap"><div class="bar" id="ram-bar" style="width:0%"></div></div>
        <hr class="divider">
        <div class="two-col">
            <div class="metric-block">
                <div class="metric-label">Used</div>
                <div class="metric-value" id="ram-used">--</div>
            </div>
            <div class="metric-block">
                <div class="metric-label">Available</div>
                <div class="metric-value" id="ram-avail">--</div>
            </div>
        </div>
        <hr class="divider">
        <div class="card-head" style="margin-top:0">Network</div>
        <div class="two-col">
            <div class="metric-block">
                <div class="metric-label">Sent</div>
                <div class="metric-value" id="net-sent">--</div>
            </div>
            <div class="metric-block">
                <div class="metric-label">Received</div>
                <div class="metric-value" id="net-recv">--</div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-head">Disk</div>
        <div class="big-val" id="disk-percent">--%</div>
        <div class="sub-val" id="disk-sub">-- / -- GB</div>
        <div class="bar-wrap"><div class="bar" id="disk-bar" style="width:0%"></div></div>
        <hr class="divider">
        <div class="two-col">
            <div class="metric-block">
                <div class="metric-label">Used</div>
                <div class="metric-value" id="disk-used">--</div>
            </div>
            <div class="metric-block">
                <div class="metric-label">Free</div>
                <div class="metric-value" id="disk-free">--</div>
            </div>
        </div>
    </div>

    <div class="card span-full">
        <div class="card-head">Top Processes</div>
        <table>
            <thead>
                <tr>
                    <th>PID</th>
                    <th>Name</th>
                    <th>CPU %</th>
                    <th>MEM %</th>
                </tr>
            </thead>
            <tbody id="process-table"></tbody>
        </table>
    </div>

</div>

<script>
    const ws = new WebSocket("ws://localhost:8000/ws/monitor");
    const status = document.getElementById("status");

    ws.onopen = () => { status.textContent = "● Live"; status.className = "connected"; };
    ws.onclose = () => { status.textContent = "● Offline"; status.className = "disconnected"; };

    function setBar(id, pct) {
        const b = document.getElementById(id);
        b.style.width = Math.min(pct, 100) + "%";
        b.className = "bar" + (pct > 80 ? " danger" : pct > 60 ? " warn" : "");
    }

    function applyColor(el, val, t=80) {
        el.className = "big-val" + (val >= t ? " danger" : val >= 60 ? " warn" : "");
    }

    ws.onmessage = (event) => {
        const d = JSON.parse(event.data);

        const cpuEl = document.getElementById("cpu-percent");
        cpuEl.textContent = d.cpu.overall + "%";
        applyColor(cpuEl, d.cpu.overall);
        document.getElementById("cpu-sub").textContent = d.cpu.count + " logical cores";
        setBar("cpu-bar", d.cpu.overall);

        const coresDiv = document.getElementById("cpu-cores");
        coresDiv.innerHTML = "";
        d.cpu.cores.forEach((pct, i) => {
            const c = pct >= 80 ? "#f85149" : pct >= 60 ? "#d29922" : "#3fb950";
            coresDiv.innerHTML += `
                <div class="core">
                    <div class="core-top">
                        <span class="core-label">Core ${i}</span>
                        <span style="color:${c};font-weight:600">${pct}%</span>
                    </div>
                    <div class="bar-wrap" style="margin:0">
                        <div class="bar" style="width:${Math.min(pct,100)}%;background:${c}"></div>
                    </div>
                </div>`;
        });

        const ramEl = document.getElementById("ram-percent");
        ramEl.textContent = d.memory.percent + "%";
        applyColor(ramEl, d.memory.percent);
        document.getElementById("ram-sub").textContent = d.memory.used + " / " + d.memory.total + " GB";
        document.getElementById("ram-used").textContent = d.memory.used + " GB";
        document.getElementById("ram-avail").textContent = d.memory.available + " GB";
        setBar("ram-bar", d.memory.percent);

        const diskEl = document.getElementById("disk-percent");
        diskEl.textContent = d.disk.percent + "%";
        applyColor(diskEl, d.disk.percent);
        document.getElementById("disk-sub").textContent = d.disk.used + " / " + d.disk.total + " GB";
        document.getElementById("disk-used").textContent = d.disk.used + " GB";
        document.getElementById("disk-free").textContent = d.disk.available + " GB";
        setBar("disk-bar", d.disk.percent);

        document.getElementById("net-sent").textContent = d.network.mb_sent + " MB";
        document.getElementById("net-recv").textContent = d.network.mb_received + " MB";

        const tbody = document.getElementById("process-table");
        tbody.innerHTML = "";
        d.processes.forEach(p => {
            const cc = p.cpu_percent >= 80 ? "#f85149" : p.cpu_percent >= 60 ? "#d29922" : "#58a6ff";
            const mc = p.memory_percent >= 80 ? "#f85149" : p.memory_percent >= 60 ? "#d29922" : "#3fb950";
            tbody.innerHTML += `<tr>
                <td>${p.pid}</td>
                <td>${p.name}</td>
                <td style="color:${cc};font-weight:600">${p.cpu_percent}%</td>
                <td style="color:${mc};font-weight:600">${p.memory_percent}%</td>
            </tr>`;
        });
    };
</script>
</body>
</html>
