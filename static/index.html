<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SysPulse</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background: #0d1117;
                color: #cdd9e5;
                font-family: "Courier New", monospace;
                padding: 2rem;
            }

            header {
                display: flex;
                align-items: center;
                gap: 1rem;
                margin-bottom: 2rem;
            }

            header h1 {
                font-size: 1.6rem;
                color: #58a6ff;
            }

            #status {
                font-size: 0.75rem;
                padding: 0.2rem 0.7rem;
                border-radius: 20px;
                background: #21262d;
                color: #8b949e;
            }

            #status.connected {
                background: #1a3a2a;
                color: #3fb950;
            }

            #status.disconnected {
                background: #3a1a1a;
                color: #f85149;
            }

            .grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 1.2rem;
            }

            .card {
                background: #161b22;
                border: 1px solid #30363d;
                border-radius: 10px;
                padding: 1.4rem;
            }

            .card h2 {
                color: #58a6ff;
                font-size: 0.75rem;
                text-transform: uppercase;
                letter-spacing: 2px;
                margin-bottom: 1rem;
                border-bottom: 1px solid #21262d;
                padding-bottom: 0.5rem;
            }

            .metric {
                display: flex;
                justify-content: space-between;
                margin-bottom: 0.5rem;
                font-size: 0.85rem;
            }

            .metric .label {
                color: #8b949e;
            }
            .metric .value {
                color: #cdd9e5;
                font-weight: bold;
            }

            .bar-container {
                background: #21262d;
                border-radius: 4px;
                height: 5px;
                margin-top: 0.8rem;
            }

            .bar {
                height: 5px;
                border-radius: 4px;
                background: #3fb950;
                transition: width 0.8s ease;
            }

            .bar.warning {
                background: #d29922;
            }
            .bar.danger {
                background: #f85149;
            }

            /* Process table */
            .card.full {
                grid-column: span 2;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                font-size: 0.82rem;
                table-layout: fixed;
            }

            thead tr {
                color: #8b949e;
                text-align: left;
                border-bottom: 1px solid #30363d;
            }

            th,
            td {
                padding: 0.5rem 0.6rem;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            th:nth-child(1),
            td:nth-child(1) {
                width: 10%;
            }
            th:nth-child(2),
            td:nth-child(2) {
                width: 50%;
            }
            th:nth-child(3),
            td:nth-child(3) {
                width: 20%;
            }
            th:nth-child(4),
            td:nth-child(4) {
                width: 20%;
            }

            tbody tr {
                border-bottom: 1px solid #21262d;
                transition: background 0.2s;
            }

            tbody tr:hover {
                background: #21262d;
            }

            td:nth-child(3) {
                color: #58a6ff;
            }
            td:nth-child(4) {
                color: #3fb950;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>⚡ SysPulse</h1>
            <span id="status">Connecting...</span>
        </header>

        <div class="grid">
            <div class="card">
                <h2>CPU</h2>
                <div class="metric">
                    <span class="label">Usage</span>
                    <span class="value" id="cpu-percent">--%</span>
                </div>
                <div class="bar-container">
                    <div class="bar" id="cpu-bar" style="width: 0%"></div>
                </div>
            </div>

            <div class="card">
                <h2>Memory</h2>
                <div class="metric">
                    <span class="label">Used</span>
                    <span class="value" id="ram-used">-- GB</span>
                </div>
                <div class="metric">
                    <span class="label">Total</span>
                    <span class="value" id="ram-total">-- GB</span>
                </div>
                <div class="metric">
                    <span class="label">Usage</span>
                    <span class="value" id="ram-percent">--%</span>
                </div>
                <div class="bar-container">
                    <div class="bar" id="ram-bar" style="width: 0%"></div>
                </div>
            </div>

            <div class="card">
                <h2>Disk</h2>
                <div class="metric">
                    <span class="label">Used</span>
                    <span class="value" id="disk-used">-- GB</span>
                </div>
                <div class="metric">
                    <span class="label">Total</span>
                    <span class="value" id="disk-total">-- GB</span>
                </div>
                <div class="metric">
                    <span class="label">Usage</span>
                    <span class="value" id="disk-percent">--%</span>
                </div>
                <div class="bar-container">
                    <div class="bar" id="disk-bar" style="width: 0%"></div>
                </div>
            </div>

            <div class="card">
                <h2>Network</h2>
                <div class="metric">
                    <span class="label">Sent</span>
                    <span class="value" id="net-sent">-- MB</span>
                </div>
                <div class="metric">
                    <span class="label">Received</span>
                    <span class="value" id="net-recv">-- MB</span>
                </div>
            </div>

            <div class="card full">
                <h2>Top Processes</h2>
                <table>
                    <thead>
                        <tr>
                            <th>PID</th>
                            <th>Name</th>
                            <th>CPU %</th>
                            <th>MEM %</th>
                        </tr>
                    </thead>
                    <tbody id="process-table"></tbody>
                </table>
            </div>
        </div>

        <script>
            const ws = new WebSocket("ws://localhost:8000/ws/monitor");
            const status = document.getElementById("status");

            ws.onopen = () => {
                status.textContent = "● Connected";
                status.className = "connected";
            };

            ws.onclose = () => {
                status.textContent = "● Disconnected";
                status.className = "disconnected";
            };

            function colorValue(id, value, threshold = 80) {
                const el = document.getElementById(id);
                el.style.color = value >= threshold ? "#f85149" : "#cdd9e5";
            }

            function setBar(id, percent) {
                const bar = document.getElementById(id);
                bar.style.width = percent + "%";
                bar.className = "bar";
                if (percent > 80) bar.classList.add("danger");
                else if (percent > 60) bar.classList.add("warning");
            }

            ws.onmessage = (event) => {
                const d = JSON.parse(event.data);

                document.getElementById("cpu-percent").textContent =
                    d.cpu + "%";
                colorValue("cpu-percent", d.cpu);
                setBar("cpu-bar", d.cpu);

                document.getElementById("ram-used").textContent =
                    d.memory.used + " GB";
                document.getElementById("ram-total").textContent =
                    d.memory.total + " GB";
                document.getElementById("ram-percent").textContent =
                    d.memory.percent + "%";
                setBar("ram-bar", d.memory.percent);
                colorValue("ram-percent", d.memory.percent);

                document.getElementById("disk-used").textContent =
                    d.disk.used + " GB";
                document.getElementById("disk-total").textContent =
                    d.disk.total + " GB";
                document.getElementById("disk-percent").textContent =
                    d.disk.percent + "%";
                setBar("disk-bar", d.disk.percent);
                colorValue("disk-percent", d.disk.percent);

                document.getElementById("net-sent").textContent =
                    d.network.mb_sent + " MB";
                document.getElementById("net-recv").textContent =
                    d.network.mb_received + " MB";

                const tbody = document.getElementById("process-table");
                tbody.innerHTML = "";
                d.processes.forEach((p) => {
                    const cpuColor =
                        p.cpu_percent >= 80 ? "#f85149" : "#58a6ff";
                    const memColor =
                        p.memory_percent >= 80 ? "#f85149" : "#3fb950";
                    const row = document.createElement("tr");
                    row.innerHTML = `
                <td>${p.pid}</td>
                <td>${p.name}</td>
                <td style="color:${cpuColor}">${p.cpu_percent}%</td>
                <td style="color:${memColor}">${p.memory_percent}%</td>
            `;
                    tbody.appendChild(row);
                });
            };
        </script>
    </body>
</html>
